<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="/css/chat.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="app">
        <div id="notifications" class="notifications"></div>
        <aside class="sidebar">
            <header class="sidebar-header">
                <h2>Chats</h2>
                <div class="new-chat-form">
                    <input type="email" id="newChatEmail" placeholder="Enter email to start chat" autocomplete="off">
                    <button id="startChatBtn">Start Chat</button>
                </div>
                <button id="createGroupBtn">Create Group</button>
            </header>
            <div class="contact-list" id="contactList"></div>
            <div class="profile-section" id="profileSection">
                <div class="profile-avatar" id="profileAvatar"></div>
                <div class="profile-info">
                    <div class="profile-name" id="profileName"></div>
                    <div class="profile-email" id="profileEmail"></div>
                </div>
                <button class="logout-btn" id="logoutBtn" title="Logout">&#x23FB;</button>
            </div>
        </aside>
        <main class="chat-area">
            <header class="chat-header" id="chatHeader">
                <span>Select a chat</span>
            </header>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state" id="emptyState">Select a contact to start chatting</div>
            </div>
            <form class="message-form" id="messageForm">
                <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                <input type="file" id="fileInput" accept="image/*,video/*,.pdf" style="display: none;">
                <button type="button" id="uploadBtn" title="Upload media">📎</button>
                <button type="submit">Send</button>
            </form>
        </main>
    </div>
    <!-- Group Creation Modal -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Create Group</h2>
            <div id="contactSelection" class="contact-selection"></div>
            <input type="text" id="groupNameInput" placeholder="Enter group name" autocomplete="off">
            <button id="createGroupBtnModal">Create</button>
        </div>
    </div>
    <script src="/js/chat.js"></script>
</body>
</html>
