<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <link rel="stylesheet" href="/css/chat.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="app">
        <main class="chat-area" style="width: 100%;">
            <header class="chat-header" id="chatHeader">
                <span>Private Chat</span>
                <button id="backBtn">Back to Chat</button>
            </header>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state" id="emptyState">Loading private chat...</div>
            </div>
            <div id="suggestions" class="suggestions" style="display: none;"></div>
            <form class="message-form" id="messageForm">
                <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                 <input type="file" id="fileInput" accept="image/*,video/*,.pdf" style="display: none;">
                 <button type="button" id="uploadBtn" title="Upload media">
                   <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;">
                     <path d="M16 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
                   </svg>
                 </button>
                 <button type="submit">Send</button>
            </form>
        </main>
    </div>
    <script src="/js/private-chat.js"></script>
</body>
</html>
